common:
  - url: https://www.allianz.com/
    type: Website
  - url: https://github.com/allianz
    type: GitHubOrganization
  - url: https://architecture.cncf.io/architectures/allianz/
    type: Documentation
  - url: rules/allianz-future-cloud-platform-spectral-rules.yml
    type: SpectralRules
  - url: vocabulary/allianz-future-cloud-platform-vocabulary.yaml
    type: Vocabulary
  - url: capabilities/cloud-platform-operations.yaml
    type: NaftikoCapability
  - type: Features
    data:
      - name: Kubernetes Platform Engineering
        description: >-
          Internal developer platform built on Kubernetes (EKS) providing
          standardized deployment, scaling, and orchestration for insurance
          microservices.
      - name: GitOps Deployment
        description: >-
          ArgoCD and Tekton-based CI/CD pipelines enabling GitOps workflows
          for continuous delivery of insurance applications.
      - name: Infrastructure as Code
        description: >-
          Terraform and Crossplane-based infrastructure management enabling
          repeatable, auditable cloud resource provisioning.
      - name: Observability Stack
        description: >-
          Prometheus, Grafana, and OpenTelemetry based observability platform
          providing metrics, tracing, and alerting for platform services.
      - name: Multi-tenant Architecture
        description: >-
          Namespace-level multi-tenancy supporting multiple insurance product
          teams on shared Kubernetes infrastructure.
      - name: Event Streaming
        description: >-
          AWS MSK (Managed Kafka) for high-throughput event streaming between
          insurance microservices and downstream consumers.
  - type: UseCases
    data:
      - name: Insurance Microservice Deployment
        description: >-
          Deploy and manage Kotlin and Java insurance microservices on the
          platform with standardized CI/CD pipelines and GitOps workflows.
      - name: Platform Onboarding
        description: >-
          Onboard new insurance product teams onto the shared Kubernetes
          platform with pre-configured namespaces and RBAC policies.
      - name: Observability and Monitoring
        description: >-
          Configure monitoring dashboards and alerting for insurance services
          using the platform's built-in Prometheus and Grafana stack.
      - name: Infrastructure Provisioning
        description: >-
          Provision cloud infrastructure resources using Terraform and
          Crossplane through the platform's infrastructure API.
  - type: Integrations
    data:
      - name: Amazon Web Services
        description: >-
          Primary cloud provider with EKS, MSK, ElastiCache Redis, and
          storage services powering the platform.
      - name: ArgoCD
        description: >-
          GitOps continuous delivery for declarative application deployment
          and state synchronization.
      - name: Terraform
        description: >-
          Infrastructure as code for cloud resource provisioning and
          management integrated with Atlantis for PR automation.
      - name: Crossplane
        description: >-
          Multi-cloud resource management extending Kubernetes for
          cloud-agnostic infrastructure provisioning.
      - name: OpenTelemetry
        description: >-
          Distributed tracing and metrics collection across microservices
          for observability and performance analysis.
      - name: Apache Kafka
        description: >-
          AWS MSK for event-driven communication between insurance
          microservices and downstream systems.
