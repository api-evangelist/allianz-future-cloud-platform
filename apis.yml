type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: >-
  The Allianz Future Cloud Platform is an internal developer platform powering
  cloud-native insurance microservices at Allianz. Built on Kubernetes and AWS,
  it provides platform engineering capabilities including service deployment,
  infrastructure management, observability, and GitOps automation across
  Allianz's global insurance operations.
